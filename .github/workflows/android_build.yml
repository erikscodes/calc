name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web Project
        run: npm run build

      - name: Generate Android Project
        run: |
          npx cap add android || npx cap sync android
          npx cap sync android

      - name: Force Fix Duplicate Kotlin Classes
        run: |
          # Этот блок принудительно запрещает Gradle использовать разные версии Kotlin
          echo "subprojects {
              configurations.all {
                  resolutionStrategy {
                      eachDependency { details ->
                          if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.startsWith('kotlin-stdlib')) {
                              details.useVersion '1.8.22'
                          }
                      }
                  }
              }
          }" >> android/build.gradle

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
